name: Deploy to VPS

on:
  push:
    branches:
      - master  # Скрипт срабатывает при пуше в ветку main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Executing remote ssh commands using ssh-key
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            source projects/test/venv/bin/activate
            cd projects/test/TestServerFeatures/

            git reset --hard HEAD
            git pull origin dev
            
            # 3. На всякий случай глушим всё на порту 5000 перед перезапуском службы
            sudo fuser -k 5000/tcp || true
            
            pip install --upgrade pip
            pip install -r requirements.txt
            
            python3 app.py